name: trade_exec_gym
version: "1.0.0"
description: >
  Smart Order Router RL Environment. Agents execute large block trades while
  minimizing Implementation Shortfall (IS) using Almgren-Chriss market-impact
  physics, dark-pool routing, and adversarial HFT pattern detection.
author: "singh"
license: "MIT"
tags:
  - openenv
  - finance
  - trading
  - market-microstructure
  - rl

server:
  port: 7860
  path: server/app.py
  object: app

action_class: TradeAction
observation_class: TradeObservation

tasks:
  - id: task_1
    name: "TWAP Beater"
    difficulty: easy
    has_grader: true
    description: >
      Buy 100,000 shares in 30 steps. Beat TWAP (equal-slice) baseline.
      Exploit intraday volume patterns.

  - id: task_2
    name: "VWAP Optimizer"
    difficulty: medium
    has_grader: true
    description: >
      Sell 250,000 shares in 60 steps tracking the U-shaped intraday volume curve.
      Beat VWAP benchmark.

  - id: task_3
    name: "Volatile Execution"
    difficulty: hard
    has_grader: true
    description: >
      Buy 400,000 shares under 3x normal volatility (sigma=0.06).
      Use dark pool routing to bypass lit-venue impact.

  - id: task_4
    name: "HFT Adversary"
    difficulty: expert
    has_grader: true
    description: >
      Sell 600,000 shares while an HFT adversary exploits predictable patterns.
      Jitter participation rates to avoid dual-gate detection.

  - id: task_5
    name: "Deadline Pressure"
    difficulty: extreme
    has_grader: true
    description: >
      Buy 1,000,000 shares in exactly 80 steps. Completion is mandatory.
      Score = 0.0 unless >=99.9% of shares are filled. No partial credit.


